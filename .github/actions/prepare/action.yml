description: Prepares the repo for a typical CI job

name: Prepare

runs:
  steps:
    - uses: pnpm/action-setup@v6
      with:
        version: 11.13.1
    - uses: actions/setup-node@v7
      with:
        node-version: '24.18.0'
        cache: pnpm
    - run: pnpm install
      shell: bash
  using: composite